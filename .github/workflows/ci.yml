name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  validate-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install project dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Install tooling
        run: npm install --no-save html-validate@8 @axe-core/cli@4 http-server@14 wait-on@7 browser-driver-manager@latest

      - name: Validate HTML
        run: npx html-validate index.html pages/*.html

      - name: Serve site
        run: npx http-server . -p 8080 --silent &

      - name: Wait for server
        run: npx wait-on http://localhost:8080/index.html

      # ubuntu-latest's preinstalled Chrome updates on its own schedule, independent of
      # this repo — @axe-core/cli's bundled chromedriver falls out of sync with it
      # periodically (a hard version match is required, not just "close enough"), which
      # fails every "axe: <page>" step below with a driver error, not a real a11y issue.
      # Installing a matched Chrome/chromedriver pair up front avoids that drift.
      - name: Sync Chrome/ChromeDriver versions
        run: |
          npx browser-driver-manager install chrome | tee /tmp/browser-driver-manager.log
          grep '^CHROMEDRIVER_TEST_PATH=' /tmp/browser-driver-manager.log \
            | sed -E 's/^(CHROMEDRIVER_TEST_PATH)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"

      - name: "axe: index.html"
        id: axe-index
        continue-on-error: true
        run: npx axe http://localhost:8080/index.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: cars.html"
        id: axe-cars
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/cars.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: car-page.html"
        id: axe-car-page
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/car-page.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: test-drive.html"
        id: axe-test-drive
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/test-drive.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: compare.html"
        id: axe-compare
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/compare.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: platform.html"
        id: axe-platform
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/platform.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: financing-calculator.html"
        id: axe-financing-calculator
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/financing-calculator.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: trade-in-estimator.html"
        id: axe-trade-in-estimator
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/trade-in-estimator.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: dashboard.html"
        id: axe-dashboard
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/dashboard.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: crm.html"
        id: axe-crm
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/crm.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: inventory.html"
        id: axe-inventory
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/inventory.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: appointments.html"
        id: axe-appointments
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/appointments.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: customers.html"
        id: axe-customers
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/customers.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: analytics.html"
        id: axe-analytics
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/analytics.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: staff-activity.html"
        id: axe-staff-activity
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/staff-activity.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: "axe: settings.html"
        id: axe-settings
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/settings.html --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --chrome-options="no-sandbox" --exit

      - name: Summarize axe outcomes
        if: always()
        run: |
          echo "| Page | Outcome |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| index.html | ${{ steps.axe-index.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cars.html | ${{ steps.axe-cars.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| car-page.html | ${{ steps.axe-car-page.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| test-drive.html | ${{ steps.axe-test-drive.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| compare.html | ${{ steps.axe-compare.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| platform.html | ${{ steps.axe-platform.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| financing-calculator.html | ${{ steps.axe-financing-calculator.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| trade-in-estimator.html | ${{ steps.axe-trade-in-estimator.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| dashboard.html | ${{ steps.axe-dashboard.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| crm.html | ${{ steps.axe-crm.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| inventory.html | ${{ steps.axe-inventory.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| appointments.html | ${{ steps.axe-appointments.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| customers.html | ${{ steps.axe-customers.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| analytics.html | ${{ steps.axe-analytics.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| staff-activity.html | ${{ steps.axe-staff-activity.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| settings.html | ${{ steps.axe-settings.outcome }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail the job if any axe audit failed
        if: >-
          steps.axe-index.outcome == 'failure' ||
          steps.axe-cars.outcome == 'failure' ||
          steps.axe-car-page.outcome == 'failure' ||
          steps.axe-test-drive.outcome == 'failure' ||
          steps.axe-compare.outcome == 'failure' ||
          steps.axe-platform.outcome == 'failure' ||
          steps.axe-financing-calculator.outcome == 'failure' ||
          steps.axe-trade-in-estimator.outcome == 'failure' ||
          steps.axe-dashboard.outcome == 'failure' ||
          steps.axe-crm.outcome == 'failure' ||
          steps.axe-inventory.outcome == 'failure' ||
          steps.axe-appointments.outcome == 'failure' ||
          steps.axe-customers.outcome == 'failure' ||
          steps.axe-analytics.outcome == 'failure' ||
          steps.axe-staff-activity.outcome == 'failure' ||
          steps.axe-settings.outcome == 'failure'
        run: |
          echo "One or more axe-core audits failed — check the 'axe: <page>' step logs above, or the Summarize axe outcomes step's job summary, for which page(s)."
          exit 1

name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  validate-and-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tooling
        run: npm install --no-save html-validate@8 @axe-core/cli@4 http-server@14 wait-on@7

      - name: Validate HTML
        run: npx html-validate index.html pages/*.html

      - name: Serve site
        run: npx http-server . -p 8080 --silent &

      - name: Wait for server
        run: npx wait-on http://localhost:8080/index.html

      - name: "axe: index.html"
        id: axe-index
        continue-on-error: true
        run: npx axe http://localhost:8080/index.html --chrome-options="no-sandbox" --exit > /tmp/axe-index.txt 2>&1

      - name: "axe: cars.html"
        id: axe-cars
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/cars.html --chrome-options="no-sandbox" --exit > /tmp/axe-cars.txt 2>&1

      - name: "axe: car-page.html"
        id: axe-car-page
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/car-page.html --chrome-options="no-sandbox" --exit > /tmp/axe-car-page.txt 2>&1

      - name: "axe: test-drive.html"
        id: axe-test-drive
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/test-drive.html --chrome-options="no-sandbox" --exit > /tmp/axe-test-drive.txt 2>&1

      - name: "axe: compare.html"
        id: axe-compare
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/compare.html --chrome-options="no-sandbox" --exit > /tmp/axe-compare.txt 2>&1

      - name: "axe: platform.html"
        id: axe-platform
        continue-on-error: true
        run: npx axe http://localhost:8080/pages/platform.html --chrome-options="no-sandbox" --exit > /tmp/axe-platform.txt 2>&1

      - name: Post axe results as a commit comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### axe-core diagnostic results"
            echo ""
            for f in index cars car-page test-drive compare platform; do
              echo "<details><summary>$f — see output</summary>"
              echo ""
              echo '```'
              tail -c 3000 "/tmp/axe-$f.txt" 2>/dev/null || echo "(no output file)"
              echo '```'
              echo "</details>"
              echo ""
            done
          } > /tmp/comment-body.md
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body=@/tmp/comment-body.md

      - name: Fail the job if any axe audit failed
        if: >-
          steps.axe-index.outcome == 'failure' ||
          steps.axe-cars.outcome == 'failure' ||
          steps.axe-car-page.outcome == 'failure' ||
          steps.axe-test-drive.outcome == 'failure' ||
          steps.axe-compare.outcome == 'failure' ||
          steps.axe-platform.outcome == 'failure'
        run: |
          echo "One or more axe-core audits failed — see the commit comment posted above for full output."
          exit 1

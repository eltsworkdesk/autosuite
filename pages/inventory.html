<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory | AutoSuite Dealer OS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/dos-inline.css">
  <style>
    .stripes { background-image: repeating-linear-gradient(135deg, oklch(94% 0.01 260) 0 8px, oklch(97% 0.006 260) 8px 16px); }
    .inv-filter-input { padding: 9px 14px; border: 1px solid oklch(88% 0.005 260); border-radius: 8px; font: 400 13px 'IBM Plex Sans', sans-serif; background: #fff; }
    .inv-view-toggle { display: flex; gap: 4px; background: oklch(94% 0.004 260); padding: 4px; border-radius: 8px; }
    .inv-view-btn { padding: 7px 12px; border-radius: 6px; font: 500 12px; border: none; cursor: pointer; background: transparent; color: oklch(50% 0.01 260); }
    .inv-view-btn.active { background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.08); color: oklch(20% 0.01 260); }
    .quick-edit-panel { position: fixed; top: 0; right: 0; height: 100vh; width: 360px; background: #fff; box-shadow: -12px 0 32px rgba(0,0,0,0.15); z-index: 1100; display: none; flex-direction: column; }
    .quick-edit-overlay { position: fixed; inset: 0; background: rgba(10,12,20,0.4); z-index: 1099; display: none; }
  </style>
</head>
<body class="dos-body">
<div class="dos-shell">
  <aside class="dos-sidebar">
    <div class="dos-brand is-3b2d2e52"><div class="is-97083f3d"></div><div class="is-dc3e742f">AutoSuite</div></div>
    <div data-dos-search class="is-4330c69b">
      <span>⌘K Search everything</span>
    </div>
    <nav class="dos-nav" aria-label="Dealer OS">
      <a href="dashboard.html" class="dos-nav-item is-2397ef19">▦ Overview</a>
      <a href="crm.html" class="dos-nav-item is-2397ef19">☎ CRM</a>
      <a href="inventory.html" class="dos-nav-item active is-f7e90231">▤ Inventory</a>
      <a href="appointments.html" class="dos-nav-item is-2397ef19">◔ Appointments</a>
      <a href="customers.html" class="dos-nav-item is-2397ef19">✎ Customers</a>
      <a href="analytics.html" class="dos-nav-item is-2397ef19">▲ Analytics</a>
      <a href="staff-activity.html" class="dos-nav-item is-2397ef19">◫ Staff Activity</a>
    </nav>
    <div class="is-df55b60c">
      <a href="settings.html" class="dos-nav-item is-2397ef19">⚙ Settings</a>
    </div>
  </aside>
  <main class="is-cc38790d">
    <div class="is-aa8ddd09">
      <h1 class="is-6f08c733">Inventory</h1>
      <div id="countsSummary" class="is-fef4eb97">— active · — draft · — sold this month</div>
      <div class="is-d869cfd4">
        <button type="button" id="bulkActionsBtn" onclick="openBulkActions()"  disabled class="is-d4c06154">Bulk actions</button>
        <button type="button" onclick="promptAddVehicle()" class="is-02c24281">+ Add vehicle</button>
        <div data-dos-bell class="is-d85c4e64">🔔<div data-dos-bell-dot class="is-c313e78d"></div></div>
      </div>
    </div>

    <div class="is-13948eb4">
      <input type="text" id="filterSearch" class="inv-filter-input is-49cdf874" placeholder="Search inventory…"  oninput="applyFilters()">
      <select id="filterStatus" class="inv-filter-input" aria-label="Filter by status" onchange="applyFilters()">
        <option value="">Status ▾</option>
        <option value="active">Active</option>
        <option value="featured">Featured</option>
        <option value="draft">Draft</option>
        <option value="sold">Sold</option>
      </select>
      <select id="filterBody" class="inv-filter-input" aria-label="Filter by body type" onchange="applyFilters()">
        <option value="">Body type ▾</option>
      </select>
      <select id="filterPrice" class="inv-filter-input" aria-label="Filter by price range" onchange="applyFilters()">
        <option value="">Price ▾</option>
        <option value="0-20000000">Under ₦20M</option>
        <option value="20000000-50000000">₦20M – ₦50M</option>
        <option value="50000000-999999999">₦50M+</option>
      </select>
      <div class="inv-view-toggle is-dc310e06">
        <button type="button" class="inv-view-btn active" data-view="table" onclick="setView('table')">Table</button>
        <button type="button" class="inv-view-btn" data-view="cards" onclick="setView('cards')">Cards</button>
      </div>
    </div>

    <!-- Featured strip -->
    <div id="featuredSection" class="is-6f243b60">
      <div class="is-bf8e3981">Featured on homepage</div>
      <div id="featuredStrip" class="is-52229003"></div>
    </div>

    <div class="is-5a356d1e">
      <!-- Table view -->
      <div id="tableViewWrap" class="is-3c773fe7">
        <div class="is-b64e61e5">
          <div><input type="checkbox" id="selectAll" aria-label="Select all vehicles" onchange="toggleSelectAll(this.checked)"></div>
          <div></div><div>Vehicle</div><div>Price</div><div>Mileage</div><div>Status</div><div>Days listed</div><div>Actions</div>
        </div>
        <div id="vehicleList"></div>
        <div id="emptyState" class="is-76756bd7">No vehicles match these filters</div>
      </div>

      <!-- Cards view -->
      <div id="cardsViewWrap" class="is-ff231f93"></div>
    </div>
  </main>
</div>

<!-- Quick edit side panel -->
<div class="quick-edit-overlay" id="quickEditOverlay" onclick="closeQuickEdit()"></div>
<div class="quick-edit-panel" id="quickEditPanel" role="dialog" aria-modal="true" aria-label="Quick edit vehicle">
  <div class="is-ba97c8dd">
    <div class="is-140a247e">Quick edit</div>
    <button type="button" onclick="closeQuickEdit()"  aria-label="Close" class="is-96d1af6f">✕</button>
  </div>
  <div class="is-d3c9f1ae">
    <div id="quickEditName" class="is-85b20de1"></div>
    <div>
      <label class="is-204b9faf">Price (₦)</label>
      <input type="number" id="qePrice" class="is-b94f2f17">
    </div>
    <div>
      <label class="is-204b9faf">Status</label>
      <select id="qeStatus" class="is-b94f2f17">
        <option value="active">Active</option>
        <option value="featured">Featured</option>
        <option value="draft">Draft</option>
        <option value="sold">Sold</option>
      </select>
    </div>
  </div>
  <div class="is-f4bbe62a">
    <button type="button" onclick="closeQuickEdit()" class="is-25c24b1f">Cancel</button>
    <button type="button" onclick="saveQuickEdit()" class="is-1c6c9cfd">Save</button>
  </div>
</div>

<script src="../js/dos-shell.js"></script>
<script>
  let vehicles = [];
  let filteredVehicles = [];
  let currentView = 'table';
  let selectedIds = new Set();
  let quickEditId = null;
  let quickEditFocusTrap = null;
  let quickEditTrigger = null;

  const fallbackVehicles = [
    { id: 1, make: 'BMW', model: 'X7', year: 2024, mileage: 5200, price: 65000000, status: 'active', body: 'SUV', color: 'Black', drivetrain: 'AWD', createdAt: new Date().toISOString() },
    { id: 2, make: 'Mercedes-Benz', model: 'S-Class', year: 2023, mileage: 12500, price: 45000000, status: 'featured', body: 'Sedan', color: 'Grey', drivetrain: 'RWD', createdAt: new Date().toISOString() },
    { id: 3, make: 'Audi', model: 'A4', year: 2022, mileage: 28300, price: 25000000, status: 'sold', body: 'Sedan', color: 'White', drivetrain: 'AWD', createdAt: new Date().toISOString() }
  ];

  async function fetchVehicles() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    try {
      const res = await fetch('/api/vehicles', { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      vehicles = data.vehicles || [];
    } catch (err) {
      console.warn('Falling back to demo inventory data:', err.message);
      vehicles = fallbackVehicles;
    }
    populateBodyFilter();
    applyFilters();
  }

  function populateBodyFilter() {
    const select = document.getElementById('filterBody');
    const bodies = [...new Set(vehicles.map(v => v.body).filter(Boolean))].sort();
    select.innerHTML = '<option value="">Body type ▾</option>' + bodies.map(b => `<option value="${b}">${b}</option>`).join('');
  }

  function daysListed(v) {
    if (!v.createdAt) return 0;
    return Math.max(0, Math.floor((Date.now() - new Date(v.createdAt).getTime()) / 86400000));
  }

  function trimOf(v) {
    return `${v.drivetrain || ''} · ${v.color || ''}`.replace(/^ · | · $/, '');
  }

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function applyFilters() {
    const q = document.getElementById('filterSearch').value.trim().toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const body = document.getElementById('filterBody').value;
    const priceRange = document.getElementById('filterPrice').value;

    filteredVehicles = vehicles.filter(v => {
      if (q && !`${v.make} ${v.model} ${v.year}`.toLowerCase().includes(q)) return false;
      if (status && v.status !== status) return false;
      if (body && v.body !== body) return false;
      if (priceRange) {
        const [min, max] = priceRange.split('-').map(Number);
        if (v.price < min || v.price > max) return false;
      }
      return true;
    });

    render();
  }

  function render() {
    renderCounts();
    renderFeatured();
    if (currentView === 'table') renderTable(); else renderCards();
  }

  function renderCounts() {
    const active = vehicles.filter(v => v.status === 'active' || v.status === 'featured').length;
    const draft = vehicles.filter(v => v.status === 'draft').length;
    const sold = vehicles.filter(v => v.status === 'sold').length;
    document.getElementById('countsSummary').textContent = `${active} active · ${draft} draft · ${sold} sold`;
  }

  function renderFeatured() {
    const featured = vehicles.filter(v => v.status === 'featured').slice(0, 4);
    const section = document.getElementById('featuredSection');
    const strip = document.getElementById('featuredStrip');
    if (featured.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    strip.innerHTML = featured.map(v => `
      <div class="is-fe44beb6">
        <div class="stripes is-141f1f5e"></div>
        <div class="is-ec940996">${esc(v.year)} ${esc(v.make)} ${esc(v.model)}</div>
        <div class="is-41b12b7b">₦${v.price.toLocaleString()}</div>
      </div>
    `).join('');
  }

  function renderTable() {
    document.getElementById('tableViewWrap').style.display = 'block';
    document.getElementById('cardsViewWrap').style.display = 'none';

    const list = document.getElementById('vehicleList');
    const emptyState = document.getElementById('emptyState');

    if (filteredVehicles.length === 0) {
      list.style.display = 'none';
      emptyState.style.display = 'block';
      return;
    }
    list.style.display = '';
    emptyState.style.display = 'none';

    list.innerHTML = filteredVehicles.map(v => `
      <div class="is-937ce8ce">
        <div><input type="checkbox" class="row-check" data-id="${v.id}" aria-label="Select ${esc(v.year)} ${esc(v.make)} ${esc(v.model)}" ${selectedIds.has(String(v.id)) ? 'checked' : ''} onchange="toggleSelect('${v.id}', this.checked)"></div>
        <div class="stripes is-86ba105f"></div>
        <div>
          <div class="is-db117290">${esc(v.year)} ${esc(v.make)} ${esc(v.model)}</div>
          <div class="is-41b12b7b">${esc(trimOf(v))}</div>
        </div>
        <div class="is-db117290">₦${v.price.toLocaleString()}</div>
        <div class="is-024dc74f">${v.mileage.toLocaleString()} km</div>
        <div>${statusPill(v.status)}</div>
        <div class="is-024dc74f">${daysListed(v)}</div>
        <div><a href="#" onclick="openQuickEdit('${v.id}'); return false;" class="is-f8fe0cda">Quick edit</a></div>
      </div>
    `).join('');
  }

  function renderCards() {
    document.getElementById('tableViewWrap').style.display = 'none';
    document.getElementById('cardsViewWrap').style.display = 'grid';
    document.getElementById('cardsViewWrap').innerHTML = filteredVehicles.map(v => `
      <div class="is-fe44beb6">
        <div class="stripes is-141f1f5e"></div>
        <div class="is-ec940996">${esc(v.year)} ${esc(v.make)} ${esc(v.model)}</div>
        <div class="is-adc0edca">₦${v.price.toLocaleString()} · ${v.mileage.toLocaleString()} km</div>
        <div class="is-948e6d6e">
          ${statusPill(v.status)}
          <a href="#" onclick="openQuickEdit('${v.id}'); return false;" class="is-2f2acdc5">Quick edit</a>
        </div>
      </div>
    `).join('');
  }

  function statusPill(status) {
    const map = {
      active: ['oklch(94% 0.03 145)', 'oklch(45% 0.13 145)', 'Active'],
      featured: ['oklch(94% 0.03 55)', 'oklch(45% 0.13 55)', 'Featured'],
      draft: ['oklch(95% 0.005 260)', 'oklch(45% 0.01 260)', 'Draft'],
      sold: ['oklch(95% 0.02 260)', 'oklch(45% 0.13 260)', 'Sold']
    };
    const [bg, color, label] = map[status] || map.active;
    return `<span style="font: 500 11px; padding: 4px 9px; border-radius: 999px; background: ${bg}; color: ${color};">${label}</span>`;
  }

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.inv-view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    render();
  }

  function toggleSelect(id, checked) {
    if (checked) selectedIds.add(String(id)); else selectedIds.delete(String(id));
    document.getElementById('bulkActionsBtn').disabled = selectedIds.size === 0;
  }

  function toggleSelectAll(checked) {
    selectedIds = checked ? new Set(filteredVehicles.map(v => String(v.id))) : new Set();
    document.getElementById('bulkActionsBtn').disabled = selectedIds.size === 0;
    renderTable();
  }

  async function openBulkActions() {
    if (selectedIds.size === 0) return;
    const result = await DosShell.openModal({
      title: `Update ${selectedIds.size} selected vehicle${selectedIds.size === 1 ? '' : 's'}`,
      confirmLabel: 'Apply',
      focusSelector: '#bulkStatus',
      bodyHtml: `
        <label for="bulkStatus" class="dos-field-label">New status</label>
        <select id="bulkStatus" class="dos-field-input">
          <option value="active">Active</option>
          <option value="featured">Featured</option>
          <option value="draft">Draft</option>
          <option value="sold">Sold</option>
        </select>
      `,
      onConfirm: async (overlay) => {
        const status = overlay.querySelector('#bulkStatus').value;
        await Promise.all([...selectedIds].map(id =>
          fetch(`/api/vehicles/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa('admin:admin') },
            body: JSON.stringify({ status })
          })
        ));
        return true;
      }
    });
    if (!result) return;
    DosShell.toast(`Updated ${selectedIds.size} vehicle(s)`);
    selectedIds = new Set();
    document.getElementById('bulkActionsBtn').disabled = true;
    await fetchVehicles();
  }

  function openQuickEdit(id) {
    const v = vehicles.find(x => String(x.id) === String(id));
    if (!v) return;
    quickEditId = id;
    quickEditTrigger = document.activeElement;
    document.getElementById('quickEditName').textContent = `${v.year} ${v.make} ${v.model}`;
    document.getElementById('qePrice').value = v.price;
    document.getElementById('qeStatus').value = v.status;
    document.getElementById('quickEditOverlay').style.display = 'block';
    document.getElementById('quickEditPanel').style.display = 'flex';
    const panel = document.getElementById('quickEditPanel');
    document.getElementById('qePrice').focus();
    quickEditFocusTrap = DosShell.trapFocus(panel, quickEditTrigger);
  }

  function closeQuickEdit() {
    quickEditId = null;
    document.getElementById('quickEditOverlay').style.display = 'none';
    document.getElementById('quickEditPanel').style.display = 'none';
    if (quickEditFocusTrap) {
      quickEditFocusTrap.release();
      quickEditFocusTrap = null;
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('quickEditPanel').style.display === 'flex') {
      closeQuickEdit();
    }
  });

  async function saveQuickEdit() {
    if (!quickEditId) return;
    try {
      const res = await fetch(`/api/vehicles/${quickEditId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa('admin:admin') },
        body: JSON.stringify({
          price: Number(document.getElementById('qePrice').value),
          status: document.getElementById('qeStatus').value
        })
      });
      if (!res.ok) throw new Error((await res.json()).error || 'Save failed');
      DosShell.toast('Vehicle updated');
      closeQuickEdit();
      await fetchVehicles();
    } catch (err) {
      DosShell.toast('Could not save: ' + err.message, 'error');
    }
  }

  async function promptAddVehicle() {
    const field = (id, label, value = '', type = 'text') => `
      <div style="margin-bottom: 14px;">
        <label for="${id}" class="dos-field-label">${label}</label>
        <input id="${id}" type="${type}" value="${value}" class="dos-field-input">
      </div>
    `;
    const result = await DosShell.openModal({
      title: 'Add vehicle',
      confirmLabel: 'Add vehicle',
      focusSelector: '#avMake',
      bodyHtml: `
        ${field('avMake', 'Make', '', 'text')}
        ${field('avModel', 'Model', '', 'text')}
        ${field('avYear', 'Year', '2024', 'number')}
        ${field('avPrice', 'Price (₦)', '25000000', 'number')}
        <div style="margin-bottom: 14px;">
          <label for="avBody" class="dos-field-label">Body type</label>
          <select id="avBody" class="dos-field-input">
            <option>Sedan</option><option>SUV</option><option>Truck</option><option>Coupe</option>
          </select>
        </div>
        ${field('avVin', 'VIN', 'DEMO' + Date.now(), 'text')}
      `,
      onConfirm: async (overlay) => {
        const make = overlay.querySelector('#avMake').value.trim();
        const model = overlay.querySelector('#avModel').value.trim();
        if (!make || !model) throw new Error('Make and model are required');
        const res = await fetch('/api/vehicles', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa('admin:admin') },
          body: JSON.stringify({
            vin: overlay.querySelector('#avVin').value.trim(),
            make, model,
            year: overlay.querySelector('#avYear').value,
            price: overlay.querySelector('#avPrice').value,
            body: overlay.querySelector('#avBody').value,
            mileage: 0,
            status: 'active'
          })
        });
        if (!res.ok) throw new Error((await res.json()).error || 'Create failed');
        return true;
      }
    });
    if (!result) return;
    DosShell.toast('Vehicle added');
    await fetchVehicles();
  }

  fetchVehicles();
  DosShell.onEvent(['vehicle.created', 'vehicle.updated', 'vehicle.deleted'], fetchVehicles);
  setInterval(fetchVehicles, 30000);
</script>
</body>
</html>

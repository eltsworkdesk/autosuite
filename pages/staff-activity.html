      <div class="is-dc310e06">
        <div data-dos-bell class="is-d85c4e64">🔔<div data-dos-bell-dot class="is-c313e78d"></div></div>

        </div>
        <div class="is-bc958880">

      <div class="is-3c773fe7">

          <div>Rep</div><div>Email</div><div>Role</div><div>Assigned</div><div>Open</div><div>Sold</div>
        </div>
        <div id="teamList"></div>
      </div>
    </div>
  </div>
</div>
<script src="../js/dos-shell.js"></script>
<script>
  async function fetchTeam() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    try {
      const res = await fetch('/api/team', {
        signal: controller.signal,
        headers: { 'Authorization': 'Basic ' + btoa('admin:admin') }
      });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      renderTeam(data.team || []);
    } catch (err) {
      console.warn('Team API unavailable:', err.message);
      renderTeam([]);
    }
  }

  function renderTeam(team) {
    document.getElementById('statActiveReps').textContent = team.filter(m => m.active).length;
    document.getElementById('statAssigned').textContent = team.reduce((sum, m) => sum + m.assignedLeadCount, 0);
    document.getElementById('statSold').textContent = team.reduce((sum, m) => sum + m.soldCount, 0);

    const list = document.getElementById('teamList');
    if (team.length === 0) {
      list.innerHTML = '<div class="is-69c2f96a">No team members yet</div>';
      return;
    }

    list.innerHTML = team.map(m => `
      <div class="is-e8be4049">
        <div class="is-86207200">
          <div class="is-5a55404e"></div>
          ${m.name}
        </div>
        <div class="is-024dc74f">${m.email}</div>
        <div class="is-350ccc93">${m.role}</div>
        <div>${m.assignedLeadCount}</div>
        <div>${m.openCount}</div>
        <div>${m.soldCount}</div>
      </div>
    `).join('');
  }

  fetchTeam();
  DosShell.onEvent(['lead.created', 'lead.updated'], fetchTeam);
  setInterval(fetchTeam, 30000);
</script>

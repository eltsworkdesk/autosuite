<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Activity | AutoSuite Dealer OS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>.dos-shell { display: grid; grid-template-columns: 236px 1fr; min-height: 100vh; }</style>
</head>
<body class="dos-body">
<div class="dos-shell">
  <aside class="dos-sidebar">
    <div class="dos-brand" style="display: flex; align-items: center; gap: 9px; padding: 6px 10px 22px;">
      <div style="width: 22px; height: 22px; border-radius: 6px; background: oklch(55% 0.16 260);"></div>
      <div style="font: 600 15px 'Space Grotesk', sans-serif; color: #fff;">AutoSuite</div>
    </div>
    <div data-dos-search style="padding: 8px 10px 14px; font: 400 13px 'IBM Plex Mono', monospace; color: oklch(55% 0.01 260); border: 1px solid oklch(30% 0.01 260); border-radius: 8px; margin-bottom: 16px; display: flex; justify-content: space-between;">
      <span>⌘K Search everything</span>
    </div>
    <nav class="dos-nav" aria-label="Dealer OS">
      <a href="dashboard.html" class="dos-nav-item" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; color: oklch(72% 0.008 260); text-decoration: none;">▦ Overview</a>
      <a href="crm.html" class="dos-nav-item" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; color: oklch(72% 0.008 260); text-decoration: none;">☎ CRM</a>
      <a href="inventory.html" class="dos-nav-item" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; color: oklch(72% 0.008 260); text-decoration: none;">▤ Inventory</a>
      <a href="appointments.html" class="dos-nav-item" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; color: oklch(72% 0.008 260); text-decoration: none;">◔ Appointments</a>
      <a href="customers.html" class="dos-nav-item" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; color: oklch(72% 0.008 260); text-decoration: none;">✎ Customers</a>
      <a href="analytics.html" class="dos-nav-item" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; color: oklch(72% 0.008 260); text-decoration: none;">▲ Analytics</a>
      <a href="staff-activity.html" class="dos-nav-item active" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; background: oklch(30% 0.02 260); color: #fff; text-decoration: none;">◫ Staff Activity</a>
    </nav>
    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 2px; padding-top: 14px; border-top: 1px solid oklch(28% 0.01 260);">
      <a href="settings.html" class="dos-nav-item" style="display: flex; gap: 10px; padding: 9px 14px; border-radius: 8px; font: 500 13px; color: oklch(72% 0.008 260); text-decoration: none;">⚙ Settings</a>
    </div>
  </aside>
  <div style="background: oklch(97.5% 0.004 90);">
    <div style="display: flex; align-items: center; gap: 16px; padding: 18px 36px; border-bottom: 1px solid oklch(91% 0.005 260); background: #fff;">
      <h1 style="font: 600 20px 'Space Grotesk', sans-serif; margin: 0;">Staff Activity</h1>
      <div style="margin-left: auto;">
        <div data-dos-bell style="position: relative;">🔔<div data-dos-bell-dot style="position: absolute; top: -3px; right: -4px; width: 7px; height: 7px; border-radius: 50%; background: oklch(65% 0.14 55);"></div></div>
      </div>
    </div>
    <div style="padding: 28px 36px;">
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;">
        <div style="background: #fff; border: 1px solid oklch(91% 0.005 260); border-radius: 12px; padding: 16px;">
          <div style="font: 500 11px 'IBM Plex Mono', monospace; text-transform: uppercase; color: oklch(50% 0.01 260); margin-bottom: 8px;">Active Reps</div>
          <div style="font: 600 24px 'Space Grotesk', sans-serif;" id="statActiveReps">-</div>
        </div>
        <div style="background: #fff; border: 1px solid oklch(91% 0.005 260); border-radius: 12px; padding: 16px;">
          <div style="font: 500 11px 'IBM Plex Mono', monospace; text-transform: uppercase; color: oklch(50% 0.01 260); margin-bottom: 8px;">Leads Assigned</div>
          <div style="font: 600 24px 'Space Grotesk', sans-serif;" id="statAssigned">-</div>
        </div>
        <div style="background: #fff; border: 1px solid oklch(91% 0.005 260); border-radius: 12px; padding: 16px;">
          <div style="font: 500 11px 'IBM Plex Mono', monospace; text-transform: uppercase; color: oklch(50% 0.01 260); margin-bottom: 8px;">Deals Closed</div>
          <div style="font: 600 24px 'Space Grotesk', sans-serif;" id="statSold">-</div>
        </div>
      </div>

      <div style="background: #fff; border: 1px solid oklch(91% 0.005 260); border-radius: 12px; overflow: hidden;">
        <div style="display: grid; grid-template-columns: 1.4fr 1.4fr 1fr 1fr 1fr 1fr; background: oklch(97% 0.004 90); padding: 12px 20px; font: 600 11px 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.04em; color: oklch(50% 0.01 260);">
          <div>Rep</div><div>Email</div><div>Role</div><div>Assigned</div><div>Open</div><div>Sold</div>
        </div>
        <div id="teamList"></div>
      </div>
    </div>
  </div>
</div>
<script src="../js/dos-shell.js"></script>
<script>
  async function fetchTeam() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    try {
      const res = await fetch('/api/team', {
        signal: controller.signal,
        headers: { 'Authorization': 'Basic ' + btoa('admin:admin') }
      });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      renderTeam(data.team || []);
    } catch (err) {
      console.warn('Team API unavailable:', err.message);
      renderTeam([]);
    }
  }

  function renderTeam(team) {
    document.getElementById('statActiveReps').textContent = team.filter(m => m.active).length;
    document.getElementById('statAssigned').textContent = team.reduce((sum, m) => sum + m.assignedLeadCount, 0);
    document.getElementById('statSold').textContent = team.reduce((sum, m) => sum + m.soldCount, 0);

    const list = document.getElementById('teamList');
    if (team.length === 0) {
      list.innerHTML = '<div style="padding: 40px; text-align: center; color: oklch(50% 0.01 260);">No team members yet</div>';
      return;
    }

    list.innerHTML = team.map(m => `
      <div style="display: grid; grid-template-columns: 1.4fr 1.4fr 1fr 1fr 1fr 1fr; padding: 14px 20px; border-top: 1px solid oklch(94% 0.005 260); align-items: center; font: 400 13px;">
        <div style="font-weight: 600; display: flex; align-items: center; gap: 8px;">
          <div style="width: 20px; height: 20px; border-radius: 50%; background: oklch(85% 0.05 260);"></div>
          ${m.name}
        </div>
        <div style="color: oklch(45% 0.01 260);">${m.email}</div>
        <div style="text-transform: capitalize; color: oklch(45% 0.01 260);">${m.role}</div>
        <div>${m.assignedLeadCount}</div>
        <div>${m.openCount}</div>
        <div>${m.soldCount}</div>
      </div>
    `).join('');
  }

  fetchTeam();
  DosShell.onEvent(['lead.created', 'lead.updated'], fetchTeam);
  setInterval(fetchTeam, 30000);
</script>
</body>
</html>

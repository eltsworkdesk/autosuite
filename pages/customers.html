<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers | AutoSuite Dealer OS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/dos-inline.css">
</head>
<body class="dos-body">
<div class="dos-shell">
  <aside class="dos-sidebar">
    <div class="dos-brand is-3b2d2e52">
      <div class="is-97083f3d"></div>
      <div class="is-dc3e742f">AutoSuite</div>
    </div>
    <div data-dos-search class="is-4330c69b">
      <span>⌘K Search everything</span>
    </div>
    <nav class="dos-nav" aria-label="Dealer OS">
      <a href="dashboard.html" class="dos-nav-item is-3fa6ef03">▦ Overview</a>
      <a href="crm.html" class="dos-nav-item is-3fa6ef03">☎ CRM</a>
      <a href="inventory.html" class="dos-nav-item is-3fa6ef03">▤ Inventory</a>
      <a href="appointments.html" class="dos-nav-item is-3fa6ef03">◔ Appointments</a>
      <a href="customers.html" class="dos-nav-item active is-1cd5d92b">✎ Customers</a>
      <a href="analytics.html" class="dos-nav-item is-3fa6ef03">▲ Analytics</a>
      <a href="staff-activity.html" class="dos-nav-item is-3fa6ef03">◫ Staff Activity</a>
    </nav>
    <div class="is-df55b60c">
      <a href="settings.html" class="dos-nav-item is-3fa6ef03">⚙ Settings</a>
    </div>
  </aside>
  <main class="is-cc38790d">
    <div class="is-aa8ddd09">
      <h1 class="is-6f08c733">Customers</h1>
      <div class="is-dc310e06">
        <div data-dos-bell class="is-d85c4e64">🔔<div data-dos-bell-dot class="is-c313e78d"></div></div>
      </div>
    </div>
    <div class="is-80ba7097">
      <div class="is-b899bea0">
        <div class="is-bc958880">
          <div class="is-0e874e4b">Total Customers</div>
          <div id="statTotal" class="is-28765d2d">-</div>
        </div>
        <div class="is-bc958880">
          <div class="is-0e874e4b">With Purchase History</div>
          <div id="statPurchased" class="is-28765d2d">-</div>
        </div>
        <div class="is-bc958880">
          <div class="is-0e874e4b">Referred</div>
          <div id="statReferred" class="is-28765d2d">-</div>
        </div>
      </div>

      <div class="is-3153fb4e">
        <button type="button" onclick="promptAddCustomer()" class="is-199df281">+ Add customer</button>
      </div>

      <div class="is-3c773fe7">
        <div class="is-5f2df640">
          <div>Name</div><div>Contact</div><div>Preferred Makes</div><div>Address</div><div>Purchases</div><div>Referral</div>
        </div>
        <div id="customerList"></div>
        <div id="emptyState" class="is-76756bd7">No customers yet</div>
      </div>
    </div>
  </main>
</div>
<script src="../js/dos-shell.js"></script>
<script>
  let customers = [];

  async function fetchCustomers() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    try {
      const res = await fetch('/api/customers', {
        signal: controller.signal,
        headers: { 'Authorization': 'Basic ' + btoa('admin:admin') }
      });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      customers = data.customers || [];
    } catch (err) {
      console.warn('Customers API unavailable:', err.message);
      customers = [];
    }
    renderCustomers();
  }

  function renderCustomers() {
    const list = document.getElementById('customerList');
    const emptyState = document.getElementById('emptyState');

    document.getElementById('statTotal').textContent = customers.length;
    document.getElementById('statPurchased').textContent = customers.filter(c => c.purchaseHistory.length > 0).length;
    document.getElementById('statReferred').textContent = customers.filter(c => c.referralCode).length;

    if (customers.length === 0) {
      list.style.display = 'none';
      emptyState.style.display = 'block';
      return;
    }
    list.style.display = '';
    emptyState.style.display = 'none';

    list.innerHTML = customers.map(c => `
      <div class="is-cfd7a1bf">
        <div class="is-db117290">${c.name}</div>
        <div class="is-024dc74f">${c.email}${c.phone ? '<br>' + c.phone : ''}</div>
        <div class="is-024dc74f">${c.preferredMakes.join(', ') || '—'}</div>
        <div class="is-206399af">${c.address || '—'}</div>
        <div>${c.purchaseHistory.length}</div>
        <div>${c.referralCode ? `<span class="is-b41ec639">${c.referralCode}</span>` : '—'}</div>
      </div>
    `).join('');
  }

  async function promptAddCustomer() {
    const result = await DosShell.openModal({
      title: 'Add customer',
      confirmLabel: 'Add customer',
      focusSelector: '#acName',
      bodyHtml: `
        <div style="margin-bottom: 14px;">
          <label for="acName" style="font: 500 12px 'IBM Plex Mono', monospace; text-transform: uppercase; color: oklch(50% 0.01 260); display: block; margin-bottom: 6px;">Name</label>
          <input id="acName" type="text" style="width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid oklch(88% 0.005 260); border-radius: 8px; font: 400 13px 'IBM Plex Sans', sans-serif;">
        </div>
        <div style="margin-bottom: 14px;">
          <label for="acEmail" style="font: 500 12px 'IBM Plex Mono', monospace; text-transform: uppercase; color: oklch(50% 0.01 260); display: block; margin-bottom: 6px;">Email</label>
          <input id="acEmail" type="email" style="width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid oklch(88% 0.005 260); border-radius: 8px; font: 400 13px 'IBM Plex Sans', sans-serif;">
        </div>
        <div>
          <label for="acPhone" style="font: 500 12px 'IBM Plex Mono', monospace; text-transform: uppercase; color: oklch(50% 0.01 260); display: block; margin-bottom: 6px;">Phone (optional)</label>
          <input id="acPhone" type="text" style="width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid oklch(88% 0.005 260); border-radius: 8px; font: 400 13px 'IBM Plex Sans', sans-serif;">
        </div>
      `,
      onConfirm: async (overlay) => {
        const name = overlay.querySelector('#acName').value.trim();
        const email = overlay.querySelector('#acEmail').value.trim();
        if (!name || !email) throw new Error('Name and email are required');
        const res = await fetch('/api/customers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa('admin:admin') },
          body: JSON.stringify({ name, email, phone: overlay.querySelector('#acPhone').value.trim() || undefined })
        });
        if (!res.ok) throw new Error((await res.json()).error || 'Create failed');
        return true;
      }
    });
    if (!result) return;
    DosShell.toast('Customer added');
    await fetchCustomers();
  }

  fetchCustomers();
  DosShell.onEvent(['customer.created'], fetchCustomers);
  setInterval(fetchCustomers, 30000);
</script>
</body>
</html>
